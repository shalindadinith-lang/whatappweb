<!DOCTYPE html>
<html>
<head>

  <title>Comments System</title>

  <style>

    body{
      font-family: Arial;
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    input, textarea{
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button{
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
    }

    .comment{
      border: 1px solid #ccc;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
    }

    .date{
      color: gray;
      font-size: 12px;
    }

  </style>

</head>

<body>

<h2>Leave a Comment</h2>

<input
  type="text"
  id="name"
  placeholder="Your Name"
>

<textarea
  id="comment"
  placeholder="Write Comment"
></textarea>

<button onclick="postComment()">
  Post Comment
</button>

<hr>

<h2>Latest Comments</h2>

<div id="comments"></div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbyoLrewoDn0QcsGF2CHJZLXiV59m9D_kcnAvK8ly89Ebz1N7UUb-qgtqAtcg6vnqDIg/exec";


// LOAD COMMENTS
async function loadComments(){

  const response =
    await fetch(SCRIPT_URL);

  const data =
    await response.json();

  const latest5 =
    data.slice(0,5);

  const commentsDiv =
    document.getElementById("comments");

  commentsDiv.innerHTML = "";

  latest5.forEach(c => {

    commentsDiv.innerHTML += `

      <div class="comment">

        <strong>${c.name}</strong>

        <p>${c.comment}</p>

        <div class="date">
          ${c.date}
        </div>

      </div>

    `;
  });
}



// POST COMMENT
async function postComment(){

  const name =
    document.getElementById("name").value;

  const comment =
    document.getElementById("comment").value;

  if(!name || !comment){

    alert("Fill all fields");

    return;
  }

  await fetch(SCRIPT_URL, {

    method: "POST",

    body: new URLSearchParams({

      name: name,

      comment: comment

    })

  });

  document.getElementById("name").value = "";

  document.getElementById("comment").value = "";

  loadComments();
}


// FIRST LOAD
loadComments();

</script>

</body>
</html>
